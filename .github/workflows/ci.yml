name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Check AI Agent skill regression
        run: pnpm skill:check

      - name: Run CLI tests with coverage
        run: pnpm --filter polyv-live-cli test:coverage

      - name: Run SDK tests with coverage
        run: pnpm --filter polyv-live-api-sdk test:coverage

      - name: Update coverage badge
        run: pnpm coverage:badge

      - name: Check Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == 20 && steps.codecov-token.outputs.available == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: polyv/polyv-live-cli
          directory: ./
          files: packages/cli/coverage/lcov.info,packages/sdk/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: matrix.node-version == 20 && !cancelled() && steps.codecov-token.outputs.available == 'true'
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/cli/test-results/junit.xml,packages/sdk/test-results/junit.xml

      - name: Skip Codecov upload
        if: matrix.node-version == 20 && steps.codecov-token.outputs.available != 'true'
        run: echo "CODECOV_TOKEN is not configured; skipping Codecov uploads."

      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          if git diff --quiet README.md; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "37795272"
          git config user.email "90859897+37795272@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update coverage badge [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Check AI Agent skill regression
        run: pnpm skill:check

      - name: Check build output
        run: |
          echo "Checking build output..."
          ls -la packages/cli/dist/
          test -f packages/cli/dist/index.js || (echo "❌ dist/index.js not found" && exit 1)
          echo "✅ Build output looks good"

      - name: Test CLI executable
        run: |
          echo "Testing CLI executable..."
          node packages/cli/dist/index.js --version || echo "Note: CLI may require authentication for full functionality"
          echo "✅ CLI executable test completed"
