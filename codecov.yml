coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

github_checks:
  annotations: true

ignore:
  - "**/*.d.ts"
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/tests/**"
